name: Security Checks

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall src tests

      - name: Run security unit tests
        run: python -m pytest

      - name: Run Bandit static analysis
        run: python -m bandit -q -r src -x src/assets,src/www/dist --severity-level high --confidence-level high

      - name: Audit Python dependencies
        run: python -m pip_audit -r requirement.txt

      - name: Scan for committed secrets
        run: |
          detect-secrets scan src scripts tests docs/security .github SECURITY.md requirement.txt requirements-dev.txt pyproject.toml \
            --exclude-files '(^|/)(src/assets|src/www/dist)/|.*\.(png|gif|ico|ttf|mp3|wav|onnx)$'
